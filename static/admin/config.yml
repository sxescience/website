backend:
  name: github
  repo: sxescience/website
  branch: main

media_folder: static/uploads
public_folder: /uploads

x-field-templates:
  localized_string: &localized_string
    label: Deutsch / English
    name: localized_string_template
    widget: object
    fields:
      - { label: Deutsch, name: de, widget: string }
      - { label: English, name: en, widget: string }
  localized_text: &localized_text
    label: Deutsch / English
    name: localized_text_template
    widget: object
    fields:
      - { label: Deutsch, name: de, widget: text }
      - { label: English, name: en, widget: text }

singletons:
  - name: landing_content
    label: Landing Page
    file: src/lib/content/landing-content.json
    fields:
      - label: "01 Header"
        name: header
        widget: object
        summary: "{{fields.brandName}}"
        fields:
          - { label: Brand Name, name: brandName, widget: string }
          - { label: Brand Subtitle, name: brandSubtitle, widget: string }
          - <<: *localized_string
            label: Skip Link Label
            name: skipLinkLabel
          - <<: *localized_string
            label: Language Toggle Label
            name: languageToggleLabel
          - <<: *localized_string
            label: Theme Toggle Aria Label
            name: themeToggleAriaLabel
          - label: Navigation
            name: nav
            widget: list
            summary: "{{fields.id}}"
            fields:
              - { label: Anchor ID, name: id, widget: string }
              - <<: *localized_string
                label: Label
                name: label
      - label: "02 Hero"
        name: hero
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Lead
            name: lead
          - <<: *localized_string
            label: Primary Label
            name: primaryLabel
          - { label: Primary Href, name: primaryHref, widget: string }
          - <<: *localized_string
            label: Secondary Label
            name: secondaryLabel
          - { label: Secondary Href, name: secondaryHref, widget: string }
          - label: Stats
            name: stats
            widget: list
            summary: "{{fields.value}}"
            fields:
              - { label: Value, name: value, widget: string }
              - <<: *localized_string
                label: Label
                name: label
      - label: "03 Über SxE"
        name: about
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Body
            name: body
          - label: Features
            name: features
            widget: list
            summary: "{{fields.title.de}}"
            fields: &feature_fields
              - { label: Icon, name: icon, widget: string }
              - <<: *localized_string
                label: Title
                name: title
              - <<: *localized_text
                label: Text
                name: text
      - label: "04 Infografiken"
        name: infographics
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - label: Items
            name: items
            widget: list
            summary: "{{fields.title.de}}"
            fields:
              - <<: *localized_string
                label: Title
                name: title
              - <<: *localized_text
                label: Teaser
                name: teaser
              - { label: Image Source, name: src, widget: image }
              - <<: *localized_text
                label: Alt Text
                name: alt
              - { label: Credit, name: credit, widget: string }
      - label: "05 FAQ"
        name: faq
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Intro
            name: intro
          - label: Groups
            name: groups
            widget: list
            summary: "{{fields.title.de}}"
            fields:
              - <<: *localized_string
                label: Title
                name: title
              - label: FAQ Item IDs
                name: itemIds
                widget: list
                min: 4
                max: 7
                field: { label: FAQ Item ID, name: itemId, widget: string }
          - label: Items
            name: items
            widget: list
            summary: "{{fields.question.de}}"
            fields:
              - { label: ID, name: id, widget: string }
              - <<: *localized_string
                label: Question
                name: question
              - <<: *localized_text
                label: Answer
                name: answer
              - label: Links
                name: links
                widget: list
                required: false
                summary: "{{fields.label.de}}"
                fields:
                  - <<: *localized_string
                    label: Label
                    name: label
                  - { label: URL, name: url, widget: string }
      - label: "06 Podcast"
        name: podcast
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Lead
            name: lead
          - <<: *localized_string
            label: CTA Label
            name: ctaLabel
          - { label: Href, name: href, widget: string }
          - { label: Fallback Thumbnail, name: fallbackThumbnail, widget: image }
          - { label: RSS TODO, name: rssTodo, widget: text }
      - label: "07 Ressourcen"
        name: resources
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - label: Categories
            name: categories
            widget: list
            summary: "{{fields.title.de}}"
            fields:
              - <<: *localized_string
                label: Title
                name: title
              - label: Items
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - <<: *localized_text
                    label: Description
                    name: description
                  - { label: URL, name: url, widget: string }
      - label: "08 Team"
        name: team
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Lead
            name: lead
          - label: Items
            name: items
            widget: list
            summary: "{{fields.title.de}}"
            fields: *feature_fields
      - label: "09 Kontakt"
        name: contact
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Kicker
            name: kicker
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Lead
            name: lead
          - <<: *localized_string
            label: Newsletter Title
            name: newsletterTitle
          - <<: *localized_text
            label: Newsletter Lead
            name: newsletterLead
          - <<: *localized_string
            label: Newsletter Email Label
            name: newsletterEmailLabel
          - <<: *localized_string
            label: Newsletter Email Placeholder
            name: newsletterEmailPlaceholder
          - <<: *localized_string
            label: Newsletter Submit Label
            name: newsletterSubmitLabel
          - <<: *localized_string
            label: Name Label
            name: nameLabel
          - <<: *localized_string
            label: Email Label
            name: emailLabel
          - <<: *localized_string
            label: Message Label
            name: messageLabel
          - <<: *localized_string
            label: Submit Label
            name: submitLabel
          - <<: *localized_text
            label: Success Message
            name: successMessage
          - { label: Email Href, name: emailHref, widget: string }
          - { label: Email Label Text, name: emailLabelText, widget: string }
          - label: Social Links
            name: socialLinks
            widget: list
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
      - label: "10 Footer"
        name: footer
        widget: object
        summary: "{{fields.copyright}}"
        fields:
          - <<: *localized_text
            label: Description
            name: description
          - <<: *localized_string
            label: Imprint Label
            name: imprintLabel
          - <<: *localized_string
            label: Privacy Label
            name: privacyLabel
          - { label: Copyright, name: copyright, widget: string }
      - label: "11 SEO & Social Sharing"
        name: meta
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Title
            name: title
          - <<: *localized_text
            label: Description
            name: description
          - { label: Open Graph Image, name: ogImage, widget: image }

  - name: news
    label: Podcast Episodes
    file: src/lib/content/news.json
    fields:
      - label: Episodes
        name: items
        widget: list
        summary: "{{fields.title}}"
        fields:
          - { label: ID, name: id, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Excerpt, name: excerpt, widget: text }
          - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD" }
          - { label: CTA Label, name: ctaLabel, widget: string }
          - { label: Href, name: href, widget: string }
          - label: Podcast Links
            name: podcastLinks
            widget: list
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: Plattform, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - label: Status
            name: status
            widget: select
            options: [published, draft]
          - { label: Order, name: order, widget: number, value_type: int, min: 1 }

  - name: legal_content
    label: Impressum und Datenschutz
    file: src/lib/content/legal-content.json
    fields:
      - { label: Brand Name, name: brandName, widget: string }
      - { label: Page Kicker, name: pageKicker, widget: string }
      - { label: Page Title, name: pageTitle, widget: string }
      - { label: Page Lead, name: pageLead, widget: text }
      - { label: Back Link Label, name: backLinkLabel, widget: string }
      - { label: Impressum Title, name: impressumTitle, widget: string }
      - { label: Impressum HTML, name: impressumHtml, widget: text }
      - { label: Website Credit Label, name: websiteCreditLabel, widget: string }
      - { label: Website LinkedIn URL, name: websiteLinkedInUrl, widget: string }
      - { label: Datenschutz Title, name: datenschutzTitle, widget: string }
      - { label: Datenschutz HTML, name: datenschutzHtml, widget: text }
      - { label: Notice Text, name: noticeText, widget: text }
