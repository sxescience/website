backend:
  name: github
  repo: sxescience/website
  branch: main

media_folder: static/uploads
public_folder: /uploads

x-field-templates:
  localized_string: &localized_string
    label: Deutsch / English
    name: localized_string_template
    widget: object
    fields:
      - { label: Deutsch, name: de, widget: string }
      - { label: English, name: en, widget: string }
  localized_text: &localized_text
    label: Deutsch / English
    name: localized_text_template
    widget: object
    fields:
      - { label: Deutsch, name: de, widget: text }
      - { label: English, name: en, widget: text }

singletons:
  - name: landing_content
    label: Startseite
    file: src/lib/content/landing-content.json
    fields:
      - label: "01 Hero"
        name: hero
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - <<: *localized_text
            label: Einleitung
            name: lead
          - <<: *localized_string
            label: Primärer Button
            name: primaryLabel
          - { label: Ziel primärer Button, name: primaryHref, widget: string }
          - <<: *localized_string
            label: Sekundärer Button
            name: secondaryLabel
          - { label: Ziel sekundärer Button, name: secondaryHref, widget: string }
          - label: Kennzahlen / Begriffe
            name: stats
            widget: list
            summary: "{{fields.value}}"
            fields:
              - { label: Wert, name: value, widget: string }
              - <<: *localized_string
                label: Beschreibung
                name: label

      - label: "02 Über SxE"
        name: about
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - <<: *localized_text
            label: Text
            name: body
          - label: Kacheln
            name: features
            widget: list
            summary: "{{fields.title.de}}"
            fields: &feature_fields
              - { label: Icon oder Emoji, name: icon, widget: string }
              - <<: *localized_string
                label: Titel
                name: title
              - <<: *localized_text
                label: Text
                name: text

      - label: "03 Infografiken"
        name: infographics
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - label: Grafiken
            name: items
            widget: list
            summary: "{{fields.title.de}}"
            fields:
              - label: Diagrammtyp
                name: variant
                widget: select
                required: false
                options:
                  - { label: "Karriere vs. Gründung", value: career }
                  - { label: "Skills", value: skills }
                  - { label: "Business-Cofounder", value: cofounder }
              - <<: *localized_string
                label: Titel
                name: title
              - <<: *localized_text
                label: Teaser
                name: teaser
              - { label: Fallback-Bild, name: src, widget: image }
              - <<: *localized_text
                label: Alt-Text
                name: alt
              - { label: Credit, name: credit, widget: string }

      - label: "04 FAQ"
        name: faq
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - <<: *localized_text
            label: Intro
            name: intro
          - label: Zwischentitel
            name: groups
            widget: list
            summary: "{{fields.title.de}}"
            hint: "Die IDs müssen zu den Fragen unten passen. Jede Gruppe braucht 4 bis 7 Fragen."
            fields:
              - <<: *localized_string
                label: Titel
                name: title
              - label: Fragen in dieser Gruppe
                name: itemIds
                widget: list
                min: 4
                max: 7
                field: { label: Fragen-ID, name: itemId, widget: string }
          - label: Fragen
            name: items
            widget: list
            summary: "{{fields.question.de}}"
            fields:
              - { label: Fragen-ID, name: id, widget: string, hint: "Wird für Links und Gruppierung genutzt. Bitte nach dem Anlegen nicht ändern." }
              - <<: *localized_string
                label: Frage
                name: question
              - <<: *localized_text
                label: Antwort
                name: answer
              - label: Links in der Antwort
                name: links
                widget: list
                required: false
                summary: "{{fields.label.de}}"
                fields:
                  - <<: *localized_string
                    label: Linktext
                    name: label
                  - { label: URL, name: url, widget: string }

      - label: "05 Podcast-Teaser"
        name: podcast
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - <<: *localized_text
            label: Text
            name: lead
          - <<: *localized_string
            label: Button
            name: ctaLabel
          - { label: Button-Ziel, name: href, widget: string }

      - label: "06 Ressourcen"
        name: resources
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - label: Kategorien
            name: categories
            widget: list
            summary: "{{fields.title.de}}"
            fields:
              - <<: *localized_string
                label: Titel
                name: title
              - label: Einträge
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - <<: *localized_text
                    label: Beschreibung
                    name: description
                  - { label: Externer Link, name: url, widget: string }

      - label: "07 Kontakt"
        name: contact
        widget: object
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Dachzeile
            name: kicker
          - <<: *localized_string
            label: Überschrift
            name: title
          - <<: *localized_text
            label: Text
            name: lead
          - <<: *localized_string
            label: Newsletter-Titel
            name: newsletterTitle
          - <<: *localized_text
            label: Newsletter-Text
            name: newsletterLead
          - <<: *localized_string
            label: Newsletter E-Mail Label
            name: newsletterEmailLabel
          - <<: *localized_string
            label: Newsletter Platzhalter
            name: newsletterEmailPlaceholder
          - <<: *localized_string
            label: Newsletter Button
            name: newsletterSubmitLabel
          - <<: *localized_string
            label: Name Label
            name: nameLabel
          - <<: *localized_string
            label: E-Mail Label
            name: emailLabel
          - <<: *localized_string
            label: Nachricht Label
            name: messageLabel
          - <<: *localized_string
            label: Absenden Button
            name: submitLabel
          - <<: *localized_text
            label: Bestätigung
            name: successMessage
          - { label: E-Mail Link, name: emailHref, widget: string }
          - { label: Sichtbare E-Mail, name: emailLabelText, widget: string }
          - label: Social Links
            name: socialLinks
            widget: list
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }

      - label: "08 Footer"
        name: footer
        widget: object
        summary: "{{fields.copyright}}"
        fields:
          - <<: *localized_text
            label: Beschreibung
            name: description
          - <<: *localized_string
            label: Impressum Label
            name: imprintLabel
          - <<: *localized_string
            label: Datenschutz Label
            name: privacyLabel
          - { label: Copyright, name: copyright, widget: string }

      - label: "09 SEO & Social Sharing"
        name: meta
        widget: object
        collapsed: true
        summary: "{{fields.title.de}}"
        fields:
          - <<: *localized_string
            label: Meta Title
            name: title
          - <<: *localized_text
            label: Meta Description
            name: description
          - { label: Open-Graph-Bild, name: ogImage, widget: image }

  - name: podcast_settings
    label: Podcast
    file: src/lib/content/podcast-settings.json
    fields:
      - { label: RSS Feed URL, name: rssUrl, widget: string, required: false }
      - <<: *localized_string
        label: Podcast-Titel
        name: title
      - <<: *localized_string
        label: Dachzeile
        name: kicker
      - <<: *localized_text
        label: Intro
        name: intro
      - <<: *localized_string
        label: Zurück-Link
        name: backLinkLabel
      - <<: *localized_string
        label: Plattformen Label
        name: listenLabel
      - <<: *localized_string
        label: Suche Label
        name: searchLabel
      - <<: *localized_string
        label: Suche Platzhalter
        name: searchPlaceholder
      - <<: *localized_string
        label: Neueste Folge Label
        name: latestLabel
      - <<: *localized_string
        label: Alle Folgen Label
        name: recentLabel
      - <<: *localized_text
        label: Keine Suchergebnisse
        name: noResultsMessage
      - <<: *localized_text
        label: Hinweis, wenn RSS fehlt
        name: missingFeedMessage
      - <<: *localized_text
        label: Hinweis bei RSS-Fehler
        name: feedErrorMessage
      - <<: *localized_text
        label: Hinweis bei leerem RSS
        name: emptyFeedMessage
      - <<: *localized_string
        label: Newsletter-Titel
        name: newsletterTitle
      - <<: *localized_text
        label: Newsletter-Text
        name: newsletterLead
      - <<: *localized_string
        label: Newsletter E-Mail Label
        name: newsletterEmailLabel
      - <<: *localized_string
        label: Newsletter Platzhalter
        name: newsletterEmailPlaceholder
      - <<: *localized_string
        label: Newsletter Button
        name: newsletterSubmitLabel
      - <<: *localized_string
        label: Folgen-Button
        name: episodeCtaLabel
      - { label: Fallback-Cover, name: fallbackCover, widget: image }
      - label: Plattformlinks
        name: platformLinks
        widget: list
        summary: "{{fields.label}}"
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - label: "SEO"
        name: seo
        widget: object
        collapsed: true
        fields:
          - <<: *localized_string
            label: Meta Title
            name: metaTitle
          - <<: *localized_text
            label: Meta Description
            name: metaDescription

  - name: legal_content
    label: Impressum & Datenschutz
    file: src/lib/content/legal-content.json
    fields:
      - { label: Markenname, name: brandName, widget: string }
      - { label: Dachzeile, name: pageKicker, widget: string }
      - { label: Seitentitel, name: pageTitle, widget: string }
      - { label: Einleitung, name: pageLead, widget: text }
      - { label: Zurück-Link Label, name: backLinkLabel, widget: string }
      - { label: Impressum Titel, name: impressumTitle, widget: string }
      - { label: Impressum HTML, name: impressumHtml, widget: text }
      - { label: Website Credit, name: websiteCreditLabel, widget: string }
      - { label: Website LinkedIn URL, name: websiteLinkedInUrl, widget: string }
      - { label: Datenschutz Titel, name: datenschutzTitle, widget: string }
      - { label: Datenschutz HTML, name: datenschutzHtml, widget: text }
      - { label: Hinweis unten, name: noticeText, widget: text }
